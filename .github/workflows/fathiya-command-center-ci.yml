name: FATHIYA Command Center CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify learning status function
        run: |
          node -e "import('./netlify/functions/learning-status.mjs').then(async m => { const r = await m.handler({ path: '/api/learning/status' }); const j = JSON.parse(r.body); if (r.statusCode !== 200 || j.status !== 'learning_foundation_active') { throw new Error('learning status function did not report active'); } console.log(JSON.stringify({ statusCode: r.statusCode, status: j.status, agents: j.active_agents.length }, null, 2)); })"

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fathiya-command-center-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
