[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

[[redirects]]
from = "/api/learning/status"
to = "/.netlify/functions/learning-status"
status = 200
force = true

[[redirects]]
from = "/command-center"
to = "/index.html"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
